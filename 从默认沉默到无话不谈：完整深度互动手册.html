<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧭 从默认沉默到无话不谈 - 全息互动训练系统 v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <style>

        :root {
            --bg-base: #fafbfc;
            --bg-card: #ffffff;
            --bg-hover: #f0f4f8;
            --text-dark: #1a202c;
            --text-body: #4a5568;
            --text-light: #718096;
            --text-muted: #a0aec0;
            --border-light: #e2e8f0;
            --border-medium: #cbd5e0;
            --blue: #4299e1;
            --blue-light: #bee3f8;
            --green: #48bb78;
            --green-light: #c6f6d5;
            --purple: #9f7aea;
            --purple-light: #e9d8fd;
            --orange: #ed8936;
            --orange-light: #feebc8;
            --red: #f56565;
            --red-light: #fed7d7;
            --pink: #ed64a6;
            --pink-light: #fbcce8;
            --teal: #38b2ac;
            --teal-light: #b2f5ea;
            --gray: #718096;
            --gray-light: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-base);
            color: var(--text-body);
            line-height: 1.7;
            font-size: 15px;
        }
        
        /* 顶部学习路径指示器 */
        .learning-progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--border-light);
            z-index: 1000;
        }
        
        .learning-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green), var(--purple));
            transition: width 0.5s ease;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 4px;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            z-index: 999;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }
        
        .top-nav-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .top-nav-steps {
            display: flex;
            gap: 8px;
            margin-left: auto;
            margin-right: 24px;
        }
        
        .step-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-light);
            border: 1px solid transparent;
        }
        
        .step-tab:hover {
            background: var(--bg-hover);
        }
        
        .step-tab.active {
            background: var(--blue);
            color: white;
        }
        
        .step-tab.completed {
            background: var(--green-light);
            color: var(--green);
        }
        
        /* 移动端菜单 */
        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            margin-right: 16px;
        }
        
        /* 主容器 */
        .main-container {
            margin-top: 60px;
            display: flex;
            min-height: calc(100vh - 60px);
        }
        
        /* 左侧菜单 */
        .left-sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-light);
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
            flex-shrink: 0;
            padding: 20px 0;
        }
        
        .sidebar-section {
            margin-bottom: 16px;
        }
        
        .sidebar-section-title {
            padding: 8px 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            font-size: 14px;
            color: var(--text-body);
        }
        
        .sidebar-item:hover {
            background: var(--bg-hover);
        }
        
        .sidebar-item.active {
            background: var(--blue-light);
            border-left-color: var(--blue);
            color: var(--blue);
        }
        
        .sidebar-item-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            font-size: 14px;
        }
        
        .sidebar-item-badge {
            margin-left: auto;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            background: var(--blue);
            color: white;
        }
        
        /* 主内容区 */
        .content-area {
            flex: 1;
            padding: 32px 48px;
            max-width: 1000px;
        }
        
        /* 搜索框 */
        .search-container {
            margin-bottom: 24px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px;
            padding-left: 48px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: var(--bg-card);
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-light);
        }
        
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 18px;
        }
        
        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--blue);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }
        
        .stat-card:nth-child(2) .stat-number { color: var(--green); }
        .stat-card:nth-child(3) .stat-number { color: var(--purple); }
        .stat-card:nth-child(4) .stat-number { color: var(--orange); }
        
        /* 学习顺序引导 */
        .learning-path-guide {
            background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .learning-path-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .learning-path-steps {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .path-step {
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-body);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .path-step:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-sm);
        }
        
        .path-step-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--blue);
            color: white;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 卡片容器 */
        .card-container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        
        .card-header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .card-header:hover {
            background: var(--bg-hover);
        }
        
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .card-subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }
        
        .card-toggle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
            color: var(--text-light);
        }
        
        .card-toggle.expanded {
            transform: rotate(180deg);
            background: var(--blue);
            color: white;
        }
        
        .card-body {
            padding: 0 24px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        
        .card-body.expanded {
            padding: 24px;
            max-height: 10000px;
        }
        
        /* 标签 */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .tag-blue { background: var(--blue-light); color: var(--blue); }
        .tag-green { background: var(--green-light); color: var(--green); }
        .tag-purple { background: var(--purple-light); color: var(--purple); }
        .tag-orange { background: var(--orange-light); color: var(--orange); }
        .tag-red { background: var(--red-light); color: var(--red); }
        .tag-pink { background: var(--pink-light); color: var(--pink); }
        .tag-teal { background: var(--teal-light); color: var(--teal); }
        .tag-gray { background: var(--gray-light); color: var(--gray); }

        /* Badge (sidebar count) */
        .badge {
            margin-left: auto;
            background: var(--bg-hover);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            padding: 1px 7px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin: 16px 0;
        }
        
        .data-table th {
            background: var(--bg-hover);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-body);
            border-bottom: 2px solid var(--border-light);
        }
        
        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: top;
        }
        
        .data-table tr:hover td {
            background: var(--bg-hover);
        }
        
        /* 进度条 */
        .progress-container {
            margin: 16px 0;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--border-light);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        /* 阶段导航 */
        .phase-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 4px 0;
        }
        
        .phase-btn {
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            background: var(--bg-hover);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .phase-btn:hover {
            background: var(--border-light);
        }
        
        .phase-btn.active {
            background: var(--blue);
            color: white;
        }
        
        .phase-btn-num {
            font-weight: 600;
            font-size: 11px;
        }
        
        /* 场景卡片 */
        .scenario-card {
            background: linear-gradient(135deg, #f7fafc, #edf2f7);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }
        
        .scenario-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .scenario-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .scenario-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .scenario-content {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 12px;
            padding: 12px;
            background: white;
            border-radius: var(--radius-sm);
        }
        
        .scenario-response {
            display: none;
        }
        
        .scenario-card.expanded .scenario-response {
            display: block;
        }

        /* Dangerous patterns */
        .dangerous-list { display: flex; flex-direction: column; gap: 12px; }
        .dangerous-item { background: var(--bg-hover); border-radius: 10px; padding: 14px; border-left: 4px solid var(--red); }
        .dangerous-name { font-weight: 700; font-size: 14px; color: var(--text-dark); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .dangerous-num { background: var(--red); color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
        .dangerous-detail { display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
        .dangerous-row { color: var(--text-secondary); line-height: 1.5; }
        .dangerous-label { font-weight: 600; color: var(--text-dark); }
        .danger-result { color: var(--red); font-weight: 500; }
        .danger-correct { color: var(--green); }

        /* Relationship milestones */
        .milestone-list { display: flex; flex-direction: column; gap: 10px; }
        .milestone-item { background: var(--bg-hover); border-radius: 10px; padding: 14px; border-left: 4px solid var(--pink); }
        .milestone-level { font-weight: 700; font-size: 15px; color: var(--text-dark); margin-bottom: 4px; }
        .milestone-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .milestone-row { font-size: 12px; color: var(--text-secondary); }
        .milestone-label { font-weight: 600; color: var(--text-dark); }
        .milestone-danger { color: var(--orange); }
        .danger-correct { color: var(--green); }

        /* ========== Evolution Center ========== */
        .evolution-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .evo-stat { background: var(--bg-hover); border-radius: 12px; padding: 14px; text-align: center; }
        .evo-stat-num { font-size: 22px; font-weight: 800; color: var(--green); }
        .evo-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .evo-sources-title { font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .evo-sources { display: flex; flex-direction: column; gap: 8px; }
        .evo-source-item { display: flex; align-items: center; gap: 10px; background: var(--bg-hover); border-radius: 8px; padding: 10px 12px; }
        .evo-source-icon { font-size: 20px; flex-shrink: 0; }
        .evo-source-info { flex: 1; min-width: 0; }
        .evo-source-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
        .evo-source-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
        .evo-source-status { font-size: 10px; }
        .evo-quotes { display: flex; flex-direction: column; gap: 10px; }
        .evo-quote-item { background: var(--bg-hover); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--green); }
        .evo-quote-text { font-size: 13px; color: var(--text-dark); font-style: italic; line-height: 1.5; margin-bottom: 6px; }
        .evo-quote-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
        .evo-log { display: flex; flex-direction: column; gap: 8px; }
        .evo-log-item { display: flex; gap: 10px; background: var(--bg-hover); border-radius: 8px; padding: 10px 12px; }
        .evo-log-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; padding-top: 2px; min-width: 60px; }
        .evo-log-content { flex: 1; }
        .evo-log-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
        .evo-log-detail { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .evo-log-source { font-size: 11px; color: var(--text-muted); }
        .evo-mechanism { background: linear-gradient(135deg, #11998e18, #38ef7d18); border: 1px solid var(--green); border-radius: 12px; padding: 16px; margin-top: 20px; }
        .evo-mech-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .evo-mech-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .evo-mech-item { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
        .evo-mech-icon { font-size: 24px; margin-bottom: 6px; }
        .evo-mech-name { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
        .evo-mech-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

        /* Spectrum grid (3f enhanced) */
        .spectrum-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .spectrum-chip {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
            opacity: 0.65;
        }
        .spectrum-chip:hover { opacity: 1; transform: translateY(-1px); }
        .spectrum-chip.active { opacity: 1; border-color: currentColor; }
        .spectrum-detail {
            background: var(--bg-hover); border-radius: 10px; padding: 14px;
            margin-top: 10px; border-left: 3px solid var(--blue);
        }
        .spectrum-levels { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
        .spectrum-level { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .spectrum-level-num { font-weight: 700; min-width: 20px; }
        .spectrum-level-bar { flex: 1; height: 6px; background: var(--border-light); border-radius: 3px; }
        .spectrum-level-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .spectrum-word { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 12px; margin: 2px; background: var(--bg-base); border: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s; }
        .spectrum-word:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }

        .milestone-danger { color: var(--orange); }

        .response-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .response-item {
            padding: 12px;
            border-radius: var(--radius-sm);
        }
        
        .response-wrong {
            background: var(--red-light);
        }
        
        .response-right {
            background: var(--green-light);
        }
        
        .response-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .response-wrong .response-label { color: var(--red); }
        .response-right .response-label { color: var(--green); }
        
        /* 层级图 */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 16px 0;
        }
        
        .level-card {
            background: var(--bg-hover);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
        }
        
        .level-badge {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        
        .level-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .level-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        
        .level-example {
            background: white;
            padding: 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-body);
        }
        
        /* 工具箱网格 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        
        .tool-card {
            background: var(--bg-hover);
            border-radius: var(--radius-md);
            padding: 16px;

        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-medium); background: transparent; color: var(--text-light); font-size: 13px; cursor: pointer; transition: all 0.15s; }
        .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
        .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
        .browser-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .browser-card { background: var(--bg-base); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px; cursor: pointer; transition: all 0.2s; }
        .browser-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .browser-card-tags { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .browser-pagination { display: flex; align-items: center; justify-content: center; gap: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); }
        .browser-pagination button { padding: 8px 20px; border-radius: var(--radius-md); border: 1px solid var(--border-medium); background: transparent; color: var(--text-body); cursor: pointer; font-size: 14px; transition: all 0.15s; }

                        for (let i = 0; i < entries.length; i++) {

                    return cats[cat] || ["全部"];
                },
                getBrowserItems() {
                    let items = [];
                    const cat = this.browserCategory;
                    if (cat === "stories") items = this.storyItems;
                    else if (cat === "games") items = this.gameItems;
                    else if (cat === "dialogues") items = this.conversationItems;
                    else if (cat === "scripts") items = this.scriptItems;
                    else if (cat === "jokes") items = this.jokeItems;
                    else if (cat === "scenes") items = this.sceneSamples;
                    else if (cat === "knowledge") items = this.knowledgeSections;
                    else if (cat === "emotions") {
                        items = this.emotionSpectraFull.flatMap(s =>
                            s.levels?.flatMap(l => (l.synonyms || []).map(w => ({ word: w, level: l.level, spectrum: s.name }))) || []
                        );
                    }
                    if (this.browserFilter !== "全部") {
                        if (cat === "emotions") items = items.filter(i => i.spectrum === this.browserFilter);
                        else if (cat === "knowledge") items = items.filter(i => i.name?.includes(this.browserFilter));
                        else items = items.filter(i => i.category === this.browserFilter);
                    }
                    if (this.browserSearch.trim()) {
                        const q = this.browserSearch.toLowerCase();
                        items = items.filter(i => JSON.stringify(i).toLowerCase().includes(q));
                    }
                    return items;
                },
                getBrowserPaginated() {
                    const all = this.getBrowserItems();
                    const start = (this.browserPage - 1) * this.browserPageSize;
                    return all.slice(start, start + this.browserPageSize);
                },
                getBrowserTotalPages() {
                    return Math.ceil(this.getBrowserItems().length / this.browserPageSize);
                },
                prevPage() { if (this.browserPage > 1) this.browserPage--; },
                nextPage() { if (this.browserPage < this.getBrowserTotalPages()) this.browserPage++; },
                openModal(type, data, title) {
                    this.modalType = type;
                    this.modalData = data;
                    this.modalTitle = title || this.getBrowserTitle(type);
                    this.modalOpen = true;
                    document.body.style.overflow = "hidden";
                },
                closeModal() {
                    this.modalOpen = false;
                    this.modalData = null;
                    this.modalType = "";
                    document.body.style.overflow = "";
                },
                performSearch() {
                    if (!this.searchQuery.trim()) { this.searchResults = null; return; }
                    this.searchLoading = true;
                    const q = this.searchQuery.toLowerCase();
                    const results = [];
                    const addIf = (items, label, getText) => {
                        items.forEach(item => {
                            const text = getText(item);
                            if (text && text.toLowerCase().includes(q)) {
                                results.push({ ...item, _label: label, _text: text.substring(0, 200) });
                            }
                        });
                    };
                    this.storyItems.forEach(s => addIf([s], "故事", i => i.title + " " + i.content));
                    this.gameItems.forEach(g => addIf([g], "游戏", i => i.name + " " + i.description));
                    this.conversationItems.forEach(d => addIf([d], "对话", i => i.situation + " " + JSON.stringify(i.messages)));
                    this.scriptItems.forEach(s => addIf([s], "话术", i => i.context + " " + (i.examples?.join(" ") || "")));
                    this.jokeItems.forEach(j => addIf([j], "段子", i => i.content));
                    this.sceneSamples.forEach(s => addIf([s], "场景", i => i.context + " " + (i.analysis || "")));
                    this.searchResults = results.slice(0, 50);
                    this.searchLoading = false;
                },
                openSearchResult(item) {
                    if (item._label === "故事") this.openModal("story", item, item.title);
                    else if (item._label === "游戏") this.openModal("game", item, item.name);
                    else if (item._label === "对话") this.openModal("dialogue", item, item.situation);
                    else if (item._label === "话术") this.openModal("script", item, item.context);
                    else if (item._label === "段子") this.openModal("joke", item, "段子");
                    else if (item._label === "场景") this.openModal("scene", item, item.context);
                },
                getItemTags(item) { return (item.tags || []).slice(0, 3); },
                toggleScenario(idx) { this.scenarios[idx].show = !this.scenarios[idx].show; },
            },
            mounted() {
                if (localStorage.getItem("darkMode") === "true" ||
                    (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches && !localStorage.getItem("darkMode"))) {
                    this.darkMode = true;
                    document.documentElement.setAttribute("data-theme", "dark");
                }
                this.loadAllData();
            }
        }).mount('#app');
</script>
</body>
</html>
